<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#g)"/>
  <!-- decorative circles -->
  <circle cx="290" cy="20" r="55" fill="rgba(255,255,255,0.04)"/>
  <circle cx="30"  cy="160" r="70" fill="rgba(255,255,255,0.03)"/>
  <!-- left accent bar -->
  <rect x="0" y="0" width="4" height="180" fill="#c084fc" opacity="0.8"/>
  <!-- bottom accent line -->
  <rect x="4" y="170" width="316" height="2" fill="#c084fc" opacity="0.15"/>
  <!-- game name -->
  <text x="165" y="78" text-anchor="middle" fill="white"
        font-size="15" font-family="'Segoe UI','Hiragino Sans','Meiryo',sans-serif" font-weight="700"
        paint-order="stroke" stroke="#000" stroke-width="2" stroke-linejoin="round">
    ポケモン スカーレット
  </text>
  <text x="165" y="97" text-anchor="middle" fill="white"
        font-size="15" font-family="'Segoe UI','Hiragino Sans','Meiryo',sans-serif" font-weight="700"
        paint-order="stroke" stroke="#000" stroke-width="2" stroke-linejoin="round">
    バイオレット
  </text>
  <!-- category badge -->
  <rect x="10" y="148" width="51" height="22" rx="5" fill="#c084fc" opacity="0.2"/>
  <text x="35.5" y="163" text-anchor="middle" fill="#c084fc"
        font-size="10" font-family="'Segoe UI',sans-serif" font-weight="600">Other</text>
</svg>